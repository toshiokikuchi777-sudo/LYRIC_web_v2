<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <!-- Google Fonts: Noto Sans JP / M PLUS Rounded 1c -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <title>お問い合わせありがとうございました | 株式会社リリック</title>
  <meta name="robots" content="noindex,nofollow">
  <meta name="Description" content="お問い合わせを受け付けました。内容を確認のうえご連絡いたします。">
  <!-- ファビコン -->
  <link rel="icon" type="images/ico" href="images/favicon.ico">
  <!-- 統合CSS（reset + 最低限のベース） -->
  <link href="css/thanks_all.css?v=20260424" rel="stylesheet" type="text/css" media="screen">
  <meta http-equiv="refresh" content="5; URL=https://n-lyric.com/company.html">
  <style>
    .thankyou-message {
      max-width: 600px;
      margin: 80px auto;
      padding: 48px 32px;
      background: #fff;
      text-align: center;
      font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
    }

    .thankyou-message h1 {
      font-size: 1.6em;
      margin-bottom: 24px;
      color: #222;
      letter-spacing: 0.04em;
    }

    .thankyou-message p {
      font-size: 1em;
      color: #444;
      line-height: 1.8;
    }

    .thankyou-message .muted {
      color: #888;
      font-size: 0.9em;
      margin-top: 24px;
    }

    .thankyou-message a {
      display: inline-block;
      margin-top: 24px;
      padding: 10px 28px;
      background: #222;
      color: #fff;
      text-decoration: none;
      border-radius: 999px;
      transition: background 0.2s ease;
    }

    .thankyou-message a:hover {
      background: #555;
    }
  </style>
</head>

<body>
  <div class="thankyou-message">
    <h1>お問い合わせありがとうございました</h1>
    <p>内容を確認のうえ、担当者よりご連絡させていただきます。</p>
    <a href="https://n-lyric.com/">トップページへ戻る</a>
    <p class="muted">5秒後に自動で会社情報ページへ戻ります。</p>
  </div>
</body>

</html>
